name: customer_app
description: Customer App for 10-minute delivery clone.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Networking & HTTP
  dio: ^5.4.0

  # Real-time and Storage
  socket_io_client: ^3.0.0
  shared_preferences: ^2.2.2

  # Location & Maps
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0

  # Firebase Core and Services
  firebase_core: ^2.27.0
  cloud_firestore: ^4.15.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
